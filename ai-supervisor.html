<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>AI 临床督导</title>
<style>
  :root {
    --bg: #f8f6f2; --card: #fffdfb; --text: #2d2925; --muted: #8f857d;
    --accent: #6b8f71; --accent-hover: #5a7d60; --light-accent: #eef4ee;
    --border: #dfe6df; --danger: #b85450; --shadow-sm: 0 1px 3px rgba(45,41,37,0.04);
    --shadow: 0 2px 12px rgba(45,41,37,0.05), 0 8px 24px rgba(45,41,37,0.04);
    --radius-sm: 10px; --radius: 14px; --radius-lg: 18px;
    --transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    font-family:"Noto Serif SC","STSong",Georgia,serif;
    background:var(--bg); color:var(--text); min-height:100vh;
    display:flex; justify-content:center; line-height:1.85;
    -webkit-font-smoothing:antialiased;
  }
  .app { width:100%; max-width:680px; padding:32px 20px 48px; display:flex; flex-direction:column; gap:32px; }

  /* Phase sections */
  .phase { display:flex; flex-direction:column; gap:16px; }
  .phase-label {
    font-size:11px; text-transform:uppercase; letter-spacing:0.12em;
    color:var(--muted); opacity:0.6; margin-bottom:-8px;
  }
  .phase-divider { height:1px; background:var(--border); margin:0; opacity:0.4; }

  /* Password gate */
  .gate { display:flex; flex-direction:column; align-items:center; justify-content:center;
    min-height:60vh; text-align:center; gap:24px; }
  .gate h1 { font-size:24px; font-weight:500; color:var(--accent); letter-spacing:0.05em; }
  .gate p { font-size:14px; color:var(--muted); max-width:460px; line-height:1.9; }
  .gate input {
    padding:14px 18px; border:1px solid var(--border); border-radius:var(--radius);
    font-size:16px; text-align:center; outline:none; width:240px;
    font-family:inherit; letter-spacing:4px; transition:var(--transition); background:var(--card);
  }
  .gate input:focus { border-color:var(--accent); box-shadow:0 0 0 4px rgba(107,143,113,0.1); }
  .gate button {
    padding:14px 48px; border:none; border-radius:var(--radius); background:var(--accent);
    color:white; font-size:15px; cursor:pointer; font-family:inherit; transition:var(--transition); letter-spacing:0.04em;
  }
  .gate button:hover { background:var(--accent-hover); transform:translateY(-1px); box-shadow:0 4px 20px rgba(107,143,113,0.2); }
  .gate .error { color:var(--danger); font-size:13px; display:none; }

  /* Main interface */
  .main { display:none; }

  .header { text-align:center; padding-bottom:20px; border-bottom:1px solid var(--border); }
  .header h1 { font-size:22px; font-weight:500; color:var(--accent); letter-spacing:0.04em; }
  .header p { font-size:13px; color:var(--muted); margin-top:8px; line-height:1.8; max-width:480px; margin-left:auto; margin-right:auto; }

  /* Back link */
  .back-link { display:inline-block; color:var(--muted); text-decoration:none; font-size:12px; margin-bottom:2px; transition:var(--transition); }
  .back-link:hover { color:var(--accent); }

  /* Upload zone — collapsible */
  .upload-toggle {
    display:inline-flex; align-items:center; gap:5px; font-size:12px; color:var(--muted);
    cursor:pointer; font-family:inherit; border:none; background:none; padding:2px 0;
    transition:var(--transition);
  }
  .upload-toggle:hover { color:var(--accent); }
  .upload-zone {
    border:2px dashed var(--border); border-radius:var(--radius); padding:18px 24px;
    text-align:center; cursor:pointer; transition:var(--transition); background:var(--card);
    display:none; align-items:center; justify-content:center; gap:8px; flex-wrap:wrap;
  }
  .upload-zone.open { display:flex; }
  .upload-zone:hover { border-color:var(--accent); background:var(--light-accent); }
  .upload-zone .icon { font-size:18px; opacity:0.7; }
  .upload-zone p { font-size:13px; color:var(--muted); margin:0; }
  .upload-zone .hint { font-size:11px; color:var(--muted); opacity:0.6; }
  #fileInfo { display:none; font-size:12px; color:var(--accent); margin-top:8px; padding:8px 12px; background:var(--light-accent); border-radius:var(--radius-sm); }

  /* Text area */
  textarea {
    width:100%; min-height:200px; border:1px solid var(--border); border-radius:var(--radius);
    padding:20px 22px; font-size:15px; font-family:inherit; resize:vertical;
    outline:none; background:var(--card); color:var(--text); line-height:2;
    transition:var(--transition);
  }
  textarea:focus { border-color:var(--accent); box-shadow:0 0 0 4px rgba(107,143,113,0.08); }

  /* Char count */
  .char-count { text-align:right; font-size:11px; color:var(--muted); margin-top:-8px; padding-right:4px; }

  /* Button row */
  .btn-row { display:flex; gap:10px; align-items:center; flex-wrap:wrap; }
  .btn-primary {
    padding:13px 28px; border:none; border-radius:var(--radius); background:var(--accent);
    color:white; font-size:14px; cursor:pointer; font-family:inherit; transition:var(--transition);
    letter-spacing:0.03em; flex:1; min-width:160px; font-weight:500;
  }
  .btn-primary:hover { background:var(--accent-hover); box-shadow:0 4px 20px rgba(107,143,113,0.2); transform:translateY(-1px); }
  .btn-primary:disabled { opacity:0.4; cursor:not-allowed; filter:grayscale(0.2); transform:none; box-shadow:none; }

  .btn-aux {
    display:inline-flex; align-items:center; gap:4px; padding:7px 14px;
    border:1px solid var(--border); border-radius:20px; background:var(--card);
    color:var(--muted); font-size:12px; cursor:pointer; font-family:inherit;
    transition:var(--transition); white-space:nowrap;
  }
  .btn-aux:hover { border-color:var(--accent); color:var(--accent); background:var(--light-accent); }
  .btn-aux.danger:hover { border-color:var(--danger); color:var(--danger); }

  /* Reply length — inline compact */
  .len-inline {
    display:flex; align-items:center; gap:8px; padding:7px 14px;
    border:1px solid var(--border); border-radius:20px; background:var(--card);
    font-size:12px; color:var(--muted); white-space:nowrap;
  }
  .len-inline label { opacity:0.7; flex-shrink:0; }
  .len-inline select {
    border:none; outline:none; font-size:12px; font-family:inherit; color:var(--accent);
    cursor:pointer; background:transparent; font-weight:600; padding:0;
    -webkit-appearance:none; appearance:none;
  }

  /* Output box */
  .output-box {
    background:var(--card); border:1px solid var(--border); border-radius:var(--radius);
    padding:24px 28px; display:none; line-height:2; font-size:15px;
    white-space:pre-wrap; box-shadow:var(--shadow); transition:var(--transition);
  }
  .output-box .ob-header {
    display:flex; justify-content:space-between; align-items:center;
    margin-bottom:16px; padding-bottom:14px; border-bottom:1px solid var(--border);
  }
  .output-box .ob-header h3 { font-size:16px; color:var(--accent); font-weight:500; margin:0; letter-spacing:0.03em; }
  .toggle-btn {
    display:inline-flex; align-items:center; gap:4px; padding:5px 14px;
    border:1px solid var(--border); border-radius:20px; background:var(--card);
    color:var(--muted); font-size:11px; cursor:pointer; font-family:inherit;
    transition:var(--transition); white-space:nowrap;
  }
  .toggle-btn:hover { border-color:var(--accent); color:var(--accent); background:var(--light-accent); }
  .output-box .label { font-weight:600; color:var(--text); margin-top:16px; display:block; }
  .impression-body { max-height:5000px; overflow:hidden; transition:max-height 0.45s cubic-bezier(0.4,0,0.2,1),opacity 0.3s ease; }
  .impression-summary { display:none; cursor:pointer; color:var(--muted); font-size:13px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; user-select:none; }
  .output-box.collapsed .impression-body { max-height:0; opacity:0; }
  .output-box.collapsed .impression-summary { display:block; }
  .output-box.collapsed .ob-header { margin-bottom:0; padding-bottom:0; border-bottom:none; }
  .output-box.collapsed .ob-header h3 { font-size:13px; color:var(--muted); font-weight:400; }
  .output-box.collapsed { padding:16px 28px; }

  /* Chat area */
  .chat-area { display:none; flex-direction:column; gap:16px; }
  .chat-messages { max-height:520px; overflow-y:auto; display:flex; flex-direction:column; gap:14px; padding:4px 0; scroll-behavior:smooth; -webkit-overflow-scrolling:touch; }
  .chat-msg {
    padding:14px 18px; border-radius:14px; font-size:14px; line-height:1.9;
    animation:fadeUp 0.35s cubic-bezier(0.4, 0, 0.2, 1);
  }
  @keyframes fadeUp { from { opacity:0; transform:translateY(10px); } to { opacity:1; transform:translateY(0); } }
  .chat-msg.user { background:var(--light-accent); align-self:flex-end; max-width:80%; border-bottom-right-radius:4px; }
  .chat-msg.ai { background:var(--card); border:1px solid var(--border); max-width:88%; border-bottom-left-radius:4px; box-shadow:var(--shadow-sm); }
  .chat-msg.typing { color:var(--muted); font-size:13px; font-style:italic; background:transparent; border:none; box-shadow:none; padding:8px 18px; }
  .chat-input-wrap { display:flex; gap:10px; align-items:flex-end; }
  .chat-input-wrap textarea { min-height:48px; max-height:100px; flex:1; font-size:14px; padding:12px 16px; }
  .chat-input-wrap button {
    padding:11px 24px; border:none; border-radius:var(--radius); background:var(--accent);
    color:white; font-size:14px; cursor:pointer; font-family:inherit;
    transition:var(--transition); flex-shrink:0; letter-spacing:0.03em; font-weight:500;
  }
  .chat-input-wrap button:hover { background:var(--accent-hover); box-shadow:0 4px 14px rgba(107,143,113,0.15); }
  .chat-input-wrap button:disabled { opacity:0.4; cursor:not-allowed; filter:grayscale(0.2); transform:none; }

  .disclaimer { text-align:center; font-size:11px; color:var(--muted); padding:8px 0; opacity:0.55; }

  /* History overlay */
  .history-overlay {
    display:none; position:fixed; inset:0; z-index:300;
    background:rgba(45,41,37,0.2); align-items:center; justify-content:center;
    backdrop-filter:blur(4px); -webkit-backdrop-filter:blur(4px);
  }
  .history-overlay.show { display:flex; }
  .history-panel {
    background:var(--card); border-radius:var(--radius-lg); padding:32px 28px 24px;
    max-width:480px; width:92%; max-height:70vh; display:flex; flex-direction:column;
    box-shadow:0 8px 48px rgba(45,41,37,0.12); animation:scaleIn 0.25s cubic-bezier(0.4, 0, 0.2, 1);
  }
  @keyframes scaleIn { from { opacity:0; transform:scale(0.95); } to { opacity:1; transform:scale(1); } }
  .history-panel .hp-header {
    display:flex; justify-content:space-between; align-items:center; margin-bottom:20px; flex-shrink:0;
  }
  .history-panel .hp-header h3 { margin:0; font-size:18px; font-weight:500; color:var(--text); }
  .history-panel .hp-close {
    width:32px; height:32px; border-radius:50%; border:1px solid var(--border);
    background:var(--card); color:var(--muted); font-size:14px; cursor:pointer;
    display:flex; align-items:center; justify-content:center; transition:var(--transition);
  }
  .history-panel .hp-close:hover { background:var(--bg); color:var(--text); }
  .history-list { overflow-y:auto; flex:1; -webkit-overflow-scrolling:touch; }
  .history-item {
    display:flex; justify-content:space-between; align-items:center; gap:14px;
    padding:16px 0; border-bottom:1px solid var(--border); transition:var(--transition);
  }
  .history-item:hover { background:var(--light-accent); margin:0 -14px; padding:16px 14px; border-radius:var(--radius-sm); }
  .history-item:last-child { border-bottom:none; }
  .history-item .hi-info { flex:1; min-width:0; }
  .history-item .hi-title {
    font-size:14px; font-weight:500; white-space:nowrap; overflow:hidden;
    text-overflow:ellipsis; margin-bottom:4px; color:var(--text);
  }
  .history-item .hi-meta { font-size:11px; color:var(--muted); }
  .history-item .hi-actions { display:flex; gap:6px; flex-shrink:0; }
  .hi-btn {
    padding:6px 16px; border-radius:16px; font-size:11px; cursor:pointer;
    font-family:inherit; transition:0.15s; border:none;
  }
  .hi-btn-load { background:var(--accent); color:#fff; }
  .hi-btn-load:hover { background:var(--accent-hover); }
  .hi-btn-del { background:none; border:1px solid var(--border); color:var(--muted); }
  .hi-btn-del:hover { border-color:var(--danger); color:var(--danger); }
  .history-empty { text-align:center; padding:48px 24px; color:var(--muted); font-size:14px; }
  .history-empty .he-icon { font-size:44px; margin-bottom:12px; opacity:0.45; }

  /* Responsive */
  @media (max-width: 576px) {
    .app { padding:24px 16px 40px; gap:24px; }
    .output-box { padding:20px 20px; }
    .btn-row { gap:8px; }
    .btn-primary { padding:12px 20px; font-size:13px; }
  }
</style>
</head>
<body>
<div class="app">
  <!-- ====== PASSWORD GATE ====== -->
  <div class="gate" id="gate">
    <h1>AI 临床督导（测试版）</h1>
    <p>基于温尼科特框架的团体心理督导方法论。上传逐字稿、案例报告或反移情困惑，AI 将输出整体印象并展开督导对话。</p>
    <input type="password" id="pwdInput" placeholder="输入密码" onkeydown="if(event.key==='Enter')verifyPassword()">
    <button onclick="verifyPassword()">进入</button>
    <p class="error" id="pwdError">密码错误，请重试。</p>
  </div>

  <!-- ====== MAIN INTERFACE ====== -->
  <div class="main" id="main">
    <a class="back-link" href="master-select.html">&larr; 返回主页</a>

    <!-- ====== PHASE 1: INPUT ====== -->
    <div class="header">
      <h1>AI 临床督导</h1>
      <p>请上传或粘贴临床材料（逐字稿 / 案例报告 / 反移情困惑）</p>
    </div>

    <div class="phase">
      <!-- Upload toggle + zone (collapsible) -->
      <div style="display:flex;justify-content:flex-end;">
        <button class="upload-toggle" onclick="toggleUpload()" id="uploadToggleBtn">&plus; 上传文件</button>
      </div>
      <div class="upload-zone" id="uploadZone" onclick="document.getElementById('fileInput').click()">
        <span class="icon">&#x1F4CE;</span><span>点击上传文件</span><span class="hint">（.txt / .md / .docx，建议 4000 字以内）</span>
        <input type="file" id="fileInput" accept=".txt,.md,.docx" style="display:none" onchange="handleFile(event)">
        <div id="fileInfo"></div>
      </div>

      <!-- Text input -->
      <textarea id="materialText" placeholder="或者直接粘贴临床材料……

逐字稿格式示例：
T（治疗师）：你今天看起来不太开心。
P（来访者）：是的，我一直在想上周你说的话……"></textarea>
      <div class="char-count" id="charCount"></div>
    </div>

    <!-- ====== PHASE 2: CONTROLS ====== -->
    <div class="phase-divider"></div>
    <div class="btn-row">
      <button class="btn-primary" id="analyzeBtn" onclick="generateImpression()">&#x1F50D; 生成整体印象</button>
      <div class="len-inline">
        <label>&#x270D;&#xFE0F;</label>
        <select id="lenSelect" onchange="updateLength(this.value)">
          <option value="0">简洁</option>
          <option value="1" selected>适中</option>
          <option value="2">详细</option>
        </select>
      </div>
      <button class="btn-aux" onclick="showHistory()">📂 历史</button>
      <button class="btn-aux" onclick="saveToHistory()">💾 保存到历史</button>
      <button class="btn-aux danger" onclick="clearAll()">清空</button>
      <button class="btn-aux" onclick="exportConversation()">📥 导出对话</button>
      <button class="btn-aux" onclick="emailConversation()">📧 发送到邮箱</button>
    </div>

    <!-- ====== PHASE 3: OUTPUT ====== -->
    <div class="output-box" id="outputBox"></div>

    <div class="chat-area" id="chatArea">
      <div class="chat-messages" id="chatMessages"></div>
      <div class="chat-input-wrap">
        <textarea id="chatInput" rows="1" placeholder="就整体印象中的内容继续讨论……" onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();sendChat()}"></textarea>
        <button id="chatSendBtn" onclick="sendChat()">发送</button>
      </div>
    </div>

    <div class="disclaimer">
      &#x26A0;&#xFE0F; 此 AI 督导为辅助工具，不能替代真人督导。如涉及危机情境，请立即寻求专业支持。
    </div>

    <!-- History overlay -->
    <div class="history-overlay" id="historyOverlay" onclick="if(event.target===this)closeHistory()">
      <div class="history-panel">
        <div class="hp-header">
          <h3>&#x1F4C2; 历史对话</h3>
          <button class="hp-close" onclick="closeHistory()">&times;</button>
        </div>
        <div class="history-list" id="historyList"></div>
      </div>
    </div>
  </div>
</div>

<script>
// ==================== UPLOAD TOGGLE ====================
function toggleUpload() {
  var zone = document.getElementById('uploadZone');
  var btn = document.getElementById('uploadToggleBtn');
  if (zone.classList.contains('open')) {
    zone.classList.remove('open');
    btn.innerHTML = '&plus; 上传文件';
  } else {
    zone.classList.add('open');
    btn.innerHTML = '&minus; 收起上传';
  }
}

// ==================== PASSWORD ====================
var PASSWORD_HASH = '8b67f39584c2f28d3f9b78b2899528ed49b230172f8fd6d74439ab1488840fcb';

async function verifyPassword() {
  var input = document.getElementById('pwdInput').value.trim();
  var data = new TextEncoder().encode(input);
  var hashBuffer = await crypto.subtle.digest('SHA-256', data);
  var hashArray = Array.from(new Uint8Array(hashBuffer));
  var hashHex = hashArray.map(function(b){ return b.toString(16).padStart(2,'0'); }).join('');

  if (hashHex === PASSWORD_HASH) {
    document.getElementById('gate').style.display = 'none';
    document.getElementById('main').style.display = 'block';
    sessionStorage.setItem('supervisor_auth', '1');
  } else {
    document.getElementById('pwdError').style.display = 'block';
  }
}

if (sessionStorage.getItem('supervisor_auth') === '1') {
  document.getElementById('gate').style.display = 'none';
  document.getElementById('main').style.display = 'block';
}

var _savedId = sessionStorage.getItem('supervisor_current_id');
if (_savedId) {
  _currentHistoryId = _savedId;
}

// ==================== REPLY LENGTH ====================
var _maxTokens = 0;
function updateLength(val) {
  var tokens = [1024, 0, 4096];
  _maxTokens = tokens[parseInt(val)];
}

// ==================== FILE HANDLING ====================
function handleFile(e) {
  // Auto-open upload zone when file chosen
  document.getElementById('uploadZone').classList.add('open');
  document.getElementById('uploadToggleBtn').innerHTML = '&minus; 收起上传';

  var file = e.target.files[0];
  if (!file) return;
  var ext = file.name.split('.').pop().toLowerCase();
  if (['txt','md','docx'].indexOf(ext) === -1) {
    alert('仅支持 .txt / .md / .docx 文件');
    return;
  }

  // 判断是否为督导风格文档（文件名含 perspective / supervision / style / framework / 方法论）
  var isStyleDoc = /perspective|supervision|style|framework|methodolog/i.test(file.name);

  document.getElementById('fileInfo').style.display = 'block';
  document.getElementById('fileInfo').textContent = isStyleDoc
    ? '正在加载督导风格文档: ' + file.name + ' ...'
    : '已选择: ' + file.name + ' (' + Math.round(file.size/1024) + ' KB)';

  var reader = new FileReader();
  reader.onload = function() {
    var text = reader.result;
    var fi = document.getElementById('fileInfo');

    if (isStyleDoc) {
      // 督导风格文档：更新 SYSTEM_PROMPT + 存入 textarea 作为参考
      setSupervisionStyle(text);
      document.getElementById('materialText').value = text;
      fi.style.display = 'block';
      fi.innerHTML = '已加载督导风格: <strong>' + file.name + '</strong> (' + Math.round(file.size/1024) + ' KB) <span style="color:var(--accent);">&#x2705; 已应用至 AI 行为</span>';
    } else {
      // 普通临床材料
      document.getElementById('materialText').value = text;
      fi.style.display = 'block';
      if (text.length > 4000) {
        fi.innerHTML = '已选择: ' + file.name + ' (' + Math.round(file.size/1024) + ' KB) <span style="color:var(--danger);">&#x26A0;&#xFE0F; 文件共 ' + text.length + ' 字，建议控制在 4000 字以内以确保分析质量</span>';
      } else {
        fi.textContent = '已选择: ' + file.name + ' (' + Math.round(file.size/1024) + ' KB)';
      }
    }
  };

  if (ext === 'docx') {
    readDocx(file, isStyleDoc);
  } else {
    reader.readAsText(file, 'UTF-8');
  }
}

function readDocx(file, isStyleDoc) {
  reader = new FileReader();
  reader.onload = function(e) {
    try {
      var arraybuffer = e.target.result;
      var zipReader = new JSZip();
      zipReader.loadAsync(arraybuffer).then(function(zip) {
        return zip.file('word/document.xml').async('string');
      }).then(function(xml) {
        var text = xml.replace(/<[^>]+>/g, ' ').replace(/\s+/g, ' ').trim();
        var fi = document.getElementById('fileInfo');

        if (isStyleDoc) {
          setSupervisionStyle(text);
          document.getElementById('materialText').value = text;
          fi.style.display = 'block';
          fi.innerHTML = '已加载督导风格: <strong>' + file.name + '</strong> (' + Math.round(file.size/1024) + ' KB) <span style="color:var(--accent);">&#x2705; 已应用至 AI 行为</span>';
        } else {
          document.getElementById('materialText').value = text;
          if (text.length > 4000) {

var isGenerating = false;

async function generateImpression() {
  if (isGenerating) return;

  try {

  var prompt = '你是一位资深临床督导师。请严格遵循你在系统提示中设定的督导风格与方法论框架，按照以下流程分析这份临床材料，输出一份"整体印象"。\n\n';

  prompt += '- 混合材料：同时出现多种特征 → 策略：反移情线索优先\n';
  prompt += '在开头用一句话声明你识别到的材料类型。\n\n';
  prompt += '【第二步：针对性输出】\n';
  prompt += '根据材料类型和你在系统提示中设定的方法论，选择合适的输出结构。做到具体、有针对性，不要套用通用模板。\n\n';
  prompt += '【第三步：风格】\n';

  prompt += '最终以这句话收尾："如果你愿意，我们可以就其中任何一点继续深入讨论。"\n\n';
  prompt += '临床材料：\n' + text;

  var messages = [
    { role: 'system', content: SYSTEM_PROMPT },
    { role: 'user', content: prompt }
  ];

  apiTier = 0;
  var gotContent = false;
  var finalReply = '';
  var lastLineBreak = false;

  while (!gotContent && apiTier < TIERS.length) {
    var tier = TIERS[apiTier];

    if (apiTier > 0 && finalReply) {
      var switchNote = '\n\n<span style="color:var(--muted);font-size:11px;">&#x26A0;&#xFE0F; 线路 ' + apiTier + ' 中断，切换至 ' + tier.name + '……</span>\n';

    }

    try {

        method: 'POST',

      });

      if (!res.ok) { apiTier++; continue; }

      var reader = res.body.getReader();

      var tierReply = '';
      var buffer = '';
      var streamFailed = false;

      while (true) {
        var result;
        try { result = await reader.read(); } catch(e) { streamFailed = true; break; }
        if (result.done) break;
        buffer += decoder.decode(result.value, { stream:true });
        var lines = buffer.split('\n');
        buffer = lines.pop() || '';
        for (var i = 0; i < lines.length; i++) {
          var line = lines[i];
          if (line.startsWith('data: ')) {
            var payload = line.slice(6).trim();
            if (payload === '[DONE]') { streamFailed = false; gotContent = true; break; }
            try {
              var parsed = JSON.parse(payload);
              var delta = parsed.choices && parsed.choices[0] && parsed.choices[0].delta;
              var content = delta && delta.content ? delta.content : '';
              if (content) {
                tierReply += content;
                var display = finalReply + tierReply;

          outputBox.innerHTML = '<div class="ob-header"><h3>&#x1F50D; 整体印象（生成中……）</h3><button onclick="toggleImpression()" id="impressionToggle" class="toggle-btn">收起 &#x25B2;</button></div><div class="impression-body">' + escapeHtml(finalReply).replace(/\n/g,'<br>') + '<span style="color:var(--accent);">&#x258D;</span></div>';
        }
        apiTier++;
      }
    } catch(e) {
      apiTier++;
    }
  }

  if (!gotContent && !finalReply) {
    outputBox.innerHTML = '<p style="color:var(--danger)">所有线路均不可用，请稍后重试。</p>';
  } else if (!gotContent && finalReply) {
    outputBox.innerHTML = '<div class="ob-header"><h3>&#x1F50D; 整体印象（部分）</h3><button onclick="toggleImpression()" id="impressionToggle" class="toggle-btn">收起 &#x25B2;</button></div><div class="impression-body">' + escapeHtml(finalReply).replace(/\n/g,'<br>') + '<p style="color:var(--muted);margin-top:12px">&#x26A0;&#xFE0F; 所有线路均中断，以上为已获取的部分内容。</p></div>';
    document.getElementById('chatArea').style.display = 'flex';
    chatMessages = [
      { role:'system', content:SYSTEM_PROMPT },
      { role:'assistant', content:finalReply }
    ];
  }

  } finally {
    isGenerating = false;
    btn.disabled = false; btn.textContent = '\u{1F50D} 生成整体印象';
    autoSave();
  }
}

  var lines = ['# AI 临床督导对话记录', '', '---', ''];
  if (hasImpression) {
    lines.push('## 整体印象');

    lines.push('---');

function escapeHtml(t) {
  return t.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function toggleImpression() {
  var box = document.getElementById('outputBox');
  var btn = document.getElementById('impressionToggle');
  box.classList.toggle('collapsed');
  if (box.classList.contains('collapsed')) {
    var bodyEl = box.querySelector('.impression-body');
    var plainText = bodyEl ? (bodyEl.textContent || '').trim() : '';
    var preview = plainText.substring(0, 80);
    if (plainText.length > 80) preview += '...';
    var summaryEl = box.querySelector('.impression-summary');
    if (!summaryEl) {
      summaryEl = document.createElement('div');
      summaryEl.className = 'impression-summary';
      summaryEl.onclick = toggleImpression;
      box.appendChild(summaryEl);
    }
    summaryEl.textContent = preview + ' ▼展开';
    btn.textContent = '展开 ▼';
  } else {
    btn.textContent = '收起 ▲';
  }
}

function autoCollapseImpression() {
  var outputBox = document.getElementById('outputBox');
  if (outputBox.style.display !== 'block') return;
  if (outputBox.classList.contains('collapsed')) return;

  var bodyEl = outputBox.querySelector('.impression-body');
  var plainText = bodyEl ? (bodyEl.textContent || '').trim() : '';
  if (!plainText) return;

  var summaryEl = outputBox.querySelector('.impression-summary');
  if (!summaryEl) {
    summaryEl = document.createElement('div');
    summaryEl.className = 'impression-summary';
    summaryEl.onclick = toggleImpression;
    outputBox.appendChild(summaryEl);
  }

  var preview = plainText.substring(0, 80);
  if (plainText.length > 80) preview += '...';
  summaryEl.textContent = preview + ' ▼展开';

  outputBox.classList.add('collapsed');
  var btn = document.getElementById('impressionToggle');
  if (btn) btn.textContent = '展开 ▼';
}

  var material = document.getElementById('materialText').value.trim();
  if (!material) {
    alert('临床材料为空，无法保存');
    return;
  }

  var title = material.replace(/\s+/g, ' ').substring(0, 30);
  var history = JSON.parse(localStorage.getItem('supervisor_history') || '[]');

  // Always create a new entry for manual save
  var newId = Date.now().toString(36) + Math.random().toString(36).slice(2, 6);
  history.push({
    id: newId,
    time: new Date().toISOString(),
    title: title,
    material: material,
    impression: document.getElementById('outputBox').innerHTML,
    chatMessages: chatMessages.slice()
  });
  if (history.length > 50) history = history.slice(-50);
  localStorage.setItem('supervisor_history', JSON.stringify(history));

  _currentHistoryId = newId;
  sessionStorage.setItem('supervisor_current_id', newId);
  alert('已保存到历史（共 ' + history.length + ' 条记录）');
}

// ==================== AUTO SAVE & HISTORY ====================
function autoSave() {
  var impressionText = (document.getElementById('outputBox').textContent || '').trim();
  if (!impressionText || impressionText.indexOf('阅读材料中') !== -1) return;
  var material = document.getElementById('materialText').value.trim();
  if (!material) return;

  var title = material.replace(/\s+/g, ' ').substring(0, 30);
  var history = JSON.parse(localStorage.getItem('supervisor_history') || '[]');

  if (_currentHistoryId) {
    for (var i = 0; i < history.length; i++) {
      if (history[i].id === _currentHistoryId) {
        history[i].time = new Date().toISOString();
        history[i].title = title;
        history[i].material = material;
        history[i].impression = document.getElementById('outputBox').innerHTML;
        history[i].chatMessages = chatMessages.slice();
        break;
      }
    }
  } else {
    _currentHistoryId = Date.now().toString(36) + Math.random().toString(36).slice(2, 6);
    sessionStorage.setItem('supervisor_current_id', _currentHistoryId);
    history.push({
      id: _currentHistoryId,
      time: new Date().toISOString(),
      title: title,
      material: material,
      impression: document.getElementById('outputBox').innerHTML,
      chatMessages: chatMessages.slice()
    });
  }
  if (history.length > 50) history = history.slice(-50);
  localStorage.setItem('supervisor_history', JSON.stringify(history));
}

function showHistory() {
  var overlay = document.getElementById('historyOverlay');
  var list = document.getElementById('historyList');
  var history = JSON.parse(localStorage.getItem('supervisor_history') || '[]');
  history.reverse();
  if (history.length === 0) {
    list.innerHTML = '<div class="history-empty"><div class="he-icon">&#x1F4ED;</div>暂无历史记录</div>';
  } else {
    var html = '';
    for (var i = 0; i < history.length; i++) {
      var h = history[i];
      var msgCount = h.chatMessages ? h.chatMessages.filter(function(m){ return m.role === 'user' || m.role === 'assistant'; }).length : 0;
      var timeStr = new Date(h.time).toLocaleString('zh-CN');
      html += '<div class="history-item">';
      html += '<div class="hi-info">';
      html += '<div class="hi-title">' + escapeHtml(h.title) + '</div>';
      html += '<div class="hi-meta">' + timeStr + ' · ' + msgCount + ' 条消息</div>';
      html += '</div>';
      html += '<div class="hi-actions">';
      html += '<button onclick="loadHistory(\'' + h.id + '\')" class="hi-btn hi-btn-load">加载</button>';
      html += '<button onclick="deleteHistory(\'' + h.id + '\')" class="hi-btn hi-btn-del">删除</button>';
      html += '</div></div>';
    }
    list.innerHTML = html;
  }
  overlay.classList.add('show');
}

function loadHistory(id) {
  var history = JSON.parse(localStorage.getItem('supervisor_history') || '[]');
  var record = null;
  for (var i = 0; i < history.length; i++) {
    if (history[i].id === id) { record = history[i]; break; }
  }
  if (!record) return;

  document.getElementById('materialText').value = record.material;
  document.getElementById('charCount').textContent = record.material.length + ' 字';
  document.getElementById('charCount').style.color = record.material.length > 4000 ? 'var(--danger)' : 'var(--muted)';

  var outputBox = document.getElementById('outputBox');
  outputBox.style.display = 'block';
  outputBox.innerHTML = record.impression;
  outputBox.classList.remove('collapsed');
  var btn = document.getElementById('impressionToggle');
  if (btn) btn.textContent = '收起 \u25B2';

  var chatArea = document.getElementById('chatArea');
  chatArea.style.display = 'flex';
  chatMessages = record.chatMessages ? record.chatMessages.slice() : [];
  var chatDiv = document.getElementById('chatMessages');
  chatDiv.innerHTML = '';
  for (var j = 0; j < chatMessages.length; j++) {
    var m = chatMessages[j];
    if (m.role === 'user') {
      chatDiv.innerHTML += '<div class="chat-msg user">' + escapeHtml(m.content) + '</div>';
    } else if (m.role === 'assistant') {
      chatDiv.innerHTML += '<div class="chat-msg ai">' + escapeHtml(m.content).replace(/\n/g,'<br>') + '</div>';
    }
  }
  if (chatDiv.lastElementChild) chatDiv.lastElementChild.scrollIntoView({ behavior: 'smooth', block: 'end' });

  _currentHistoryId = id;
  sessionStorage.setItem('supervisor_current_id', id);
  closeHistory();
}

function deleteHistory(id) {
  if (!confirm('确定删除这条历史记录？')) return;
  var history = JSON.parse(localStorage.getItem('supervisor_history') || '[]');
  history = history.filter(function(h){ return h.id !== id; });
  localStorage.setItem('supervisor_history', JSON.stringify(history));
  if (_currentHistoryId === id) {
    _currentHistoryId = null;
    sessionStorage.removeItem('supervisor_current_id');
  }
  showHistory();
}

function closeHistory() {
  document.getElementById('historyOverlay').classList.remove('show');
}
</script>
