<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>圆桌会议室 — 多大师对话</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body { font-family:"Noto Serif SC","Source Han Serif SC","Songti SC","STSong",Georgia,serif; background:#faf8f5; color:#2d2925; min-height:100vh; height:100vh; display:flex; justify-content:center; line-height:1.8; overflow:hidden; -webkit-font-smoothing:antialiased; }
  .app { width:100%; max-width:720px; display:flex; flex-direction:column; height:100vh; min-height:0; overflow:hidden; background:#faf8f5; }

  /* Header */
  .header { padding:14px 20px 6px; text-align:center; border-bottom:1px solid #e8e1d9; background:#fffdfb; flex-shrink:0; position:relative; z-index:2; }
  .header h1 { font-size:16px; font-weight:500; margin-bottom:2px; }
  .header p { font-size:11px; color:#8f857d; margin-bottom:6px; }
  .back-link { position:absolute; left:16px; top:14px; font-size:12px; color:#8f857d; text-decoration:none; }
  .back-link:hover { color:#8b6f5c; }

  /* Avatar bar */
  .avatar-bar { display:flex; gap:6px; padding:8px 20px; background:#fffdfb; border-bottom:1px solid #e8e1d9; flex-shrink:0; overflow-x:auto; flex-wrap:wrap; align-items:center; }
  .avatar-item { display:flex; flex-direction:column; align-items:center; gap:2px; cursor:pointer; padding:4px 8px; border-radius:8px; border:1px solid transparent; transition:0.15s; min-width:56px; }
  .avatar-item:hover { background:#f3ede6; }
  .avatar-item.active { border-color:#8b6f5c; background:#f3ede6; }
  .avatar-item .circle { width:32px; height:32px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:12px; font-weight:600; color:white; flex-shrink:0; transition:transform 0.2s ease, box-shadow 0.2s ease; }
  .avatar-item:hover .circle { transform:scale(1.08); }
  .avatar-item .aname { font-size:10px; color:#8f857d; white-space:nowrap; }
  .avatar-item .abadge { font-size:8px; line-height:1; }
  .avatar-item .abadge.online { color:#6b9; }
  .avatar-item .abadge.offline { color:#c99; }
  .avatar-invite { font-size:18px; cursor:pointer; padding:4px 10px; border-radius:8px; border:1px dashed #d5c8e0; color:#8f857d; background:none; font-family:inherit; line-height:1; transition:all 0.2s ease; }
  .avatar-invite:hover { background:#f3ede6; border-color:#8b6f5c; transform:scale(1.05); }
  .avatar-invite:active { transform:scale(0.95); }

  /* Chat area */
  .chat-area { flex:1; overflow-y:auto; padding:16px 20px; display:flex; flex-direction:column; gap:12px; min-height:0; scroll-behavior:smooth; }
  .chat-area::-webkit-scrollbar { width:4px; }
  .chat-area::-webkit-scrollbar-thumb { background:#e8e1d9; border-radius:2px; }
  .chat-area::-webkit-scrollbar-thumb:hover { background:#d5c8b8; }

  /* Messages */
  .msg { padding:12px 16px; border-radius:14px; max-width:85%; position:relative; animation: fadeIn 0.35s cubic-bezier(0.16,1,0.3,1); }
  .msg.user { align-self:flex-end; background:#ece5dc; border-bottom-right-radius:4px; }
  .msg.master { align-self:flex-start; border-bottom-left-radius:4px; transition:box-shadow 0.2s ease; }
  .msg.master:hover { box-shadow:0 2px 12px rgba(45,41,37,0.06); }
  .msg .msg-header { display:flex; align-items:center; gap:6px; margin-bottom:4px; }
  .msg .msg-avatar { width:22px; height:22px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:9px; font-weight:600; color:white; flex-shrink:0; }
  .msg .msg-name { font-size:11px; font-weight:600; }
  .msg .msg-time { font-size:9px; color:#8f857d; margin-left:auto; }
  .msg .msg-text { font-size:13px; line-height:1.8; white-space:pre-wrap; word-break:break-word; }
  .msg .msg-text strong { color:#3C3489; font-weight:600; }
  .msg .msg-text em { font-style:normal; color:#8f857d; }
  .msg .msg-text.loading { color:#8f857d; font-style:italic; }

  /* Input area */
  .input-area { padding:10px 16px 14px; border-top:1px solid #e8e1d9; background:#fffdfb; flex-shrink:0; }
  .input-row { display:flex; gap:8px; align-items:flex-end; }
  .input-row textarea { flex:1; padding:10px 14px; border:1px solid #e8e1d9; border-radius:12px; font-size:13px; font-family:inherit; outline:none; resize:none; min-height:44px; max-height:120px; background:#faf8f5; color:#2d2925; line-height:1.6; transition:border-color 0.2s ease, box-shadow 0.2s ease; }
  .input-row textarea:focus { border-color:#8b6f5c; box-shadow:0 0 0 3px rgba(139,111,92,0.08); }
  .input-row .send-btn { padding:10px 20px; border:none; border-radius:12px; background:#8b6f5c; color:white; font-size:13px; cursor:pointer; font-family:inherit; transition:all 0.2s ease; white-space:nowrap; }
  .input-row .send-btn:hover { background:#7a5f4d; transform:scale(1.02); }
  .input-row .send-btn:active { transform:scale(0.97); }
  .input-row .send-btn:disabled { background:#ccc; cursor:not-allowed; transform:none; }

  /* Toolbar */
  .toolbar { display:flex; gap:6px; padding:6px 16px 0; background:#fffdfb; flex-shrink:0; flex-wrap:wrap; }
  .toolbar button { background:none; border:1px solid #e8e1d9; border-radius:6px; padding:3px 10px; font-size:11px; cursor:pointer; color:#8f857d; font-family:inherit; transition:all 0.15s ease; }
  .toolbar button:hover { background:#f3ede6; color:#2d2925; border-color:#d5c8b8; }
  .toolbar button:active { transform:scale(0.95); }
  .toolbar button.active-mode { background:#8b6f5c; color:white; border-color:#8b6f5c; }
  .toolbar .font-group { margin-left:auto; display:flex; gap:2px; }
  .toolbar .font-group button { width:26px; padding:3px 0; text-align:center; font-size:13px; font-weight:600; }
  .toolbar .rounds-toggle { font-size:10px; color:#8f857d; }
  .toolbar .rounds-toggle input { vertical-align:middle; margin-right:2px; accent-color:#8b6f5c; }

  /* Preset buttons */
  .preset-grid { display:grid; grid-template-columns:1fr 1fr; gap:8px; margin-bottom:12px; }
  .preset-card { padding:10px 12px; border-radius:10px; border:1px solid #e8e1d9; cursor:pointer; text-align:center; transition:all 0.2s ease; background:#faf8f5; }
  .preset-card:hover { border-color:#8b6f5c; background:#f3ede6; transform:translateY(-1px); }
  .preset-card:active { transform:translateY(0); }
  .preset-card .pc-title { font-size:12px; font-weight:500; color:#2d2925; }
  .preset-card .pc-sub { font-size:10px; color:#8f857d; margin-top:2px; }

  /* Settings panel */
  .settings-btn { position:absolute; right:12px; top:12px; background:none; border:1px solid #e8e1d9; border-radius:6px; padding:2px 8px; font-size:11px; cursor:pointer; color:#8f857d; font-family:inherit; line-height:1.6; transition:all 0.15s ease; }
  .settings-btn:hover { background:#f3ede6; border-color:#d5c8b8; }
  .settings-btn:active { transform:scale(0.95); }
  .settings-panel { max-height:0; overflow:hidden; transition:max-height 0.4s cubic-bezier(0.4,0,0.2,1), padding 0.3s ease; background:#fffdfb; border-bottom:1px solid #e8e1d9; padding:0 20px; }
  .settings-panel.open { max-height:400px; padding:12px 20px; overflow-y:auto; }
  .settings-panel h3 { font-size:12px; font-weight:500; margin-bottom:8px; color:#8f857d; }
  .settings-row { display:flex; align-items:center; gap:6px; margin-bottom:5px; }
  .settings-row label { font-size:10px; color:#8f857d; width:56px; flex-shrink:0; }
  .settings-row input { flex:1; padding:5px 8px; border:1px solid #e8e1d9; border-radius:6px; font-size:11px; outline:none; background:#faf8f5; font-family:monospace; color:#2d2925; transition:border-color 0.2s ease; }
  .settings-row input:focus { border-color:#8b6f5c; }
  .mode-toggle { display:flex; gap:0; margin-bottom:8px; border-radius:6px; overflow:hidden; border:1px solid #e8e1d9; }
  .mode-toggle button { flex:1; padding:5px 0; border:none; font-size:11px; cursor:pointer; font-family:inherit; transition:all 0.15s ease; }
  .mode-toggle .d-btn { background:#f3ede6; color:#2d2925; }
  .mode-toggle .d-btn.active { background:#8b6f5c; color:white; }
  .mode-toggle .c-btn { background:#faf8f5; color:#2d2925; }
  .mode-toggle .c-btn.active { background:#d4a056; color:white; }
  .preset-row { display:flex; gap:3px; flex-wrap:wrap; margin-top:4px; }
  .preset-row button { font-size:9px; padding:2px 7px; border:1px solid #e8e1d9; border-radius:5px; background:#faf8f5; cursor:pointer; font-family:inherit; color:#8f857d; }
  .preset-row button:hover { border-color:#8b6f5c; }
  .api-save-btn { margin-top:4px; width:100%; padding:5px; border:none; border-radius:6px; background:#8b6f5c; color:white; font-size:11px; cursor:pointer; font-family:inherit; }
  .api-save-btn:hover { background:#7a5f4d; }

  /* History list */
  .history-item { display:flex; align-items:center; padding:8px 12px; border-bottom:1px solid #e8e1d9; font-size:12px; cursor:pointer; transition:0.1s; }
  .history-item:hover { background:#f3ede6; }
  .history-item .hi-info { flex:1; }
  .history-item .hi-title { font-weight:500; }
  .history-item .hi-meta { font-size:10px; color:#8f857d; }
  .history-item .hi-actions button { background:none; border:1px solid #e8e1d9; border-radius:4px; padding:2px 8px; font-size:10px; cursor:pointer; font-family:inherit; color:#8f857d; margin-left:4px; }
  .history-item .hi-actions button:hover { background:#f3ede6; }
  .history-empty { text-align:center; padding:24px; color:#8f857d; font-size:12px; }

  /* Banner */
  .banner { position:fixed; top:0; left:50%; transform:translateX(-50%); z-index:300; background:#8b6f5c; color:white; padding:8px 20px; border-radius:0 0 10px 10px; font-size:12px; opacity:0; transition:opacity 0.3s; pointer-events:none; }
  .banner.show { opacity:1; pointer-events:auto; }

  /* Invite modal */
  .overlay { position:fixed; inset:0; z-index:200; background:rgba(0,0,0,0.3); display:none; align-items:center; justify-content:center; }
  .overlay.show { display:flex; }
  .modal { background:#fffdfb; border-radius:14px; padding:24px; width:90%; max-width:420px; box-shadow:0 4px 24px rgba(0,0,0,0.15); max-height:80vh; overflow-y:auto; }
  .modal h3 { font-size:15px; font-weight:500; margin-bottom:12px; }
  .modal .m-item { display:flex; align-items:center; gap:10px; padding:10px 12px; border-radius:8px; cursor:pointer; transition:0.1s; margin-bottom:4px; }
  .modal .m-item:hover { background:#f3ede6; }
  .modal .m-item.disabled { opacity:0.4; cursor:not-allowed; }
  .modal .m-item .circle { width:28px; height:28px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:10px; font-weight:600; color:white; flex-shrink:0; }
  .modal .m-item .minfo { flex:1; }
  .modal .m-item .minfo .mname { font-size:13px; }
  .modal .m-item .minfo .msub { font-size:10px; color:#8f857d; }
  .modal .m-item input[type=checkbox] { width:16px; height:16px; accent-color:#8b6f5c; }
  .modal .modal-actions { display:flex; gap:8px; margin-top:12px; }
  .modal .modal-actions button { flex:1; padding:8px; border:none; border-radius:10px; font-size:12px; cursor:pointer; font-family:inherit; }
  .modal .modal-actions .btn-primary { background:#8b6f5c; color:white; }
  .modal .modal-actions .btn-primary:hover { background:#7a5f4d; }
  .modal .modal-actions .btn-cancel { background:#f3ede6; color:#2d2925; }
  .modal .modal-actions .btn-cancel:hover { background:#e8e1d9; }

  /* Typing indicator */
  .typing { display:flex; align-items:center; gap:10px; padding:8px 16px; align-self:flex-start; }
  .typing .typing-dots { display:flex; gap:3px; }
  .typing .typing-dots span { width:6px; height:6px; border-radius:50%; background:#8f857d; animation: typing 1.4s infinite; }
  .typing .typing-dots span:nth-child(2) { animation-delay:0.2s; }
  .typing .typing-dots span:nth-child(3) { animation-delay:0.4s; }
  .typing .typing-label { font-size:10px; color:#8f857d; }

  @keyframes fadeIn { from{opacity:0;transform:translateY(6px)} to{opacity:1;transform:translateY(0)} }
  @keyframes typing { 0%,60%,100%{opacity:0.3;transform:scale(1)} 30%{opacity:1;transform:scale(1.2)} }

  /* Name dialog */
  .name-overlay { position:fixed; inset:0; z-index:400; background:rgba(0,0,0,0.4); display:none; align-items:center; justify-content:center; backdrop-filter:blur(4px); -webkit-backdrop-filter:blur(4px); }
  .name-box { background:#fffdfb; border-radius:20px; padding:32px 28px; width:90%; max-width:360px; text-align:center; box-shadow:0 12px 50px rgba(0,0,0,0.15); animation:fadeIn 0.4s cubic-bezier(0.16,1,0.3,1); }
  .name-box .n-avatar { width:52px; height:52px; border-radius:50%; background:#8b6f5c; color:white; display:flex; align-items:center; justify-content:center; font-size:22px; font-weight:600; margin:0 auto 14px; }
  .name-box .n-msg { font-size:14px; color:#2d2925; line-height:1.9; margin-bottom:18px; }
  .name-box input { width:100%; padding:12px 16px; border:1px solid #e8e1d9; border-radius:12px; font-size:14px; font-family:inherit; outline:none; background:#faf8f5; color:#2d2925; box-sizing:border-box; transition:border-color 0.2s ease, box-shadow 0.2s ease; }
  .name-box input:focus { border-color:#8b6f5c; box-shadow:0 0 0 3px rgba(139,111,92,0.08); }
  .name-box .n-btn { width:100%; padding:12px; border:none; border-radius:12px; background:#8b6f5c; color:white; font-size:14px; cursor:pointer; font-family:inherit; margin-top:12px; transition:all 0.2s ease; }
  .name-box .n-btn:hover { background:#7a5f4d; transform:translateY(-1px); }
  .name-box .n-btn:active { transform:translateY(0); }
  .name-box .n-btn:disabled { background:#ccc; cursor:not-allowed; transform:none; }
</style>
</head>
<body>
<div class="app">
  <!-- Header -->
  <div class="header" style="position:relative;">
    <a class="back-link" href="index.html">&larr; 返回</a>
    <h1>🪑 圆桌会议室 <span style="font-size:10px;color:#8f857d;font-weight:400;">v5.1</span></h1>
    <p>多位大师同时回应的对话空间</p>
    <button class="settings-btn" onclick="toggleSettings()" title="API 设置">⚙️</button>
  </div>

  <!-- Settings panel -->
  <div class="settings-panel" id="settingsPanel">
    <h3>API 设置</h3>
    <div class="mode-toggle">
      <button class="d-btn active" id="dBtn" onclick="setMode('default')">默认 API</button>
      <button class="c-btn" id="cBtn" onclick="setMode('custom')">自用 API</button>
    </div>
    <div id="customFields" style="display:none;">
      <div class="settings-row"><label>API 地址</label><input id="cApi" placeholder="https://api.openai.com/v1/chat/completions"></div>
      <div class="settings-row"><label>API Key</label><input id="cKey" placeholder="sk-..."></div>
      <div class="settings-row"><label>模型</label><input id="cModel" placeholder="gpt-4o"></div>
      <div class="preset-row">
        <button onclick="fillPreset('https://api.deepseek.com/v1/chat/completions','deepseek-chat')">DeepSeek</button>
        <button onclick="fillPreset('https://api.openai.com/v1/chat/completions','gpt-4o')">OpenAI</button>
        <button onclick="fillPreset('https://api.siliconflow.cn/v1/chat/completions','deepseek-ai/DeepSeek-V3')">硅基流动</button>
      </div>
      <button class="api-save-btn" onclick="saveSettings()">保存设置</button>
      <span id="savedHint" style="font-size:10px;color:#8b6f5c;margin-left:8px;display:none;">已保存</span>
    </div>
  </div>

  <!-- Toolbar -->
  <div class="toolbar">
    <button onclick="openPresets()">🎯 预设组合</button>
    <button onclick="setRespondMode()" id="modeToggleBtn">🌐 全体回应</button>
    <button onclick="clearChat()">🔄 新对话</button>
    <button onclick="saveHistory()">💾 保存对话</button>
    <button onclick="showHistory()">📋 历史记录</button>
    <span class="rounds-toggle">
      <input type="checkbox" id="roundsCheck" checked onchange="updateRounds()"><label for="roundsCheck">串行</label>
    </span>
    <span class="font-group">
      <button onclick="zoomFont(-1)" title="缩小">A−</button>
      <button onclick="zoomFont(1)" title="放大">A+</button>
    </span>
    <button onclick="showReward()" style="background:none;border:1px solid var(--border);padding:4px 10px;border-radius:20px;font-size:12px;cursor:pointer;color:var(--muted);font-family:inherit;">☕ 打赏</button>
  </div>

  <!-- Avatar bar -->
  <div class="avatar-bar" id="avatarBar"></div>

  <!-- Chat area -->
  <div class="chat-area" id="chatArea">
    <div class="msg master" style="background:#f5f0eb;align-self:center;max-width:90%;border-radius:12px;text-align:center;font-size:12px;color:#8f857d;line-height:1.8;">
      点击大师头像可切换其自动回应状态。<br>
      输入 <code>@大师名</code> 可指定回应对象。<br>
      也可从气泡底部的「追问」快速@大师。
    </div>
  </div>

  <!-- Input area -->
  <div class="input-area">
    <div class="input-row">
      <textarea id="inputEl" placeholder="输入你的问题…" onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();sendMsg()}" rows="1"></textarea>
      <button class="send-btn" id="sendBtn" onclick="sendMsg()">发送</button>
    </div>
  </div>
</div>

<!-- Reward overlay -->
<div class="reward-overlay" id="rtRewardOverlay" style="position:fixed;inset:0;z-index:999;background:rgba(0,0,0,0.3);display:none;align-items:center;justify-content:center;">
  <div style="background:var(--card);border-radius:16px;padding:28px 24px;text-align:center;max-width:360px;width:90%;box-shadow:0 4px 24px rgba(0,0,0,0.15);">
    <h3 style="margin:0 0 4px;font-size:16px;font-weight:500;color:var(--text);">☕ 觉得是个好活？</h3>
    <p style="font-size:12px;color:var(--muted);margin:0 0 16px;line-height:1.6;">这网站免费用，但 API 调一次几毛钱<br>如果你聊得开心，可以打赏点 token 钱</p>
    <img src="reward-qr.jpg" alt="打赏二维码" style="width:200px;height:200px;border-radius:8px;">
    <button onclick="closeReward()" style="margin-top:12px;background:none;border:1px solid var(--border);border-radius:8px;padding:8px 20px;font-size:12px;cursor:pointer;color:var(--muted);font-family:inherit;">收到，关掉</button>
  </div>
</div>

<!-- Invite modal -->
<div class="overlay" id="inviteOverlay" onclick="if(event.target===this)closeInvite()">
  <div class="modal">
    <h3>邀请大师加入</h3>
    <div id="inviteList"></div>
    <div class="modal-actions">
      <button class="btn-primary" onclick="confirmInvite()">确认</button>
      <button class="btn-cancel" onclick="closeInvite()">取消</button>
    </div>
  </div>
</div>

<!-- History modal -->
<div class="overlay" id="historyOverlay" onclick="if(event.target===this)closeHistory()">
  <div class="modal">
    <h3>📋 对话历史</h3>
    <div id="historyList"><div class="history-empty">暂无保存的对话</div></div>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeHistory()">关闭</button>
    </div>
  </div>
</div>

<!-- Banner -->
<div class="banner" id="banner"></div>

<!-- Name dialog -->
<div class="name-overlay" id="nameOverlay">
  <div class="name-box">
    <div class="n-avatar">W</div>
    <div class="n-msg">你好，我是温尼科特。<br>在你坐下之前，我想先知道——<br>我该怎么称呼你？</div>
    <input id="nameInput" placeholder="输入你的名字或昵称" onkeydown="if(event.key==='Enter')confirmName()" maxlength="20">
    <button class="n-btn" id="nameBtn" onclick="confirmName()">好的，我们开始吧</button>
  </div>
</div>

<!-- Preset modal -->
<div class="overlay" id="presetOverlay" onclick="if(event.target===this)closePresets()">
  <div class="modal">
    <h3>🎯 预设组合</h3>
    <div class="preset-grid" id="presetGrid"></div>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closePresets()">关闭</button>
    </div>
  </div>
</div>

<script>
// ====== Master Config ======
var MASTERS = {
  winnicott: { name:'温尼科特', initial:'W', icon:'🧸',
    avatar:'', sub:'儿科医生 · 足够好的母亲 · 过渡性客体',
    kb:'winnicott-perspective.md', accent:'#8b6f5c', light:'#f3ede6',
    font:'"Georgia","Noto Serif SC",serif',
    permanent:true,
    hint:'一生都在琢磨「在场」这件事',
    intro:'我是温尼科特。一个看了四十年孩子的儿科医生，后来成了精神分析师。我发明了「足够好的母亲」「过渡性客体」这些词，但说实话，它们都是从诊所里长出来的，不是我想出来的。我们就随便聊聊，不用太正式。' },
  freud: { name:'弗洛伊德', initial:'F', icon:'🧔',

function addMsg(name, text, isUser) {
  var area = document.getElementById('chatArea');
  var div = document.createElement('div');
  var m = MASTERS[name];
  if (isUser) {
    div.className = 'msg user';
    div.innerHTML = '<div class="msg-text" style="font-size:'+fontSize+'%">' + escapeHtml(text) + '</div>';
  } else if (name === 'system') {
    div.style.cssText = 'align-self:center;font-size:11px;color:#8f857d;padding:4px 0;';
    div.textContent = '—— ' + text + ' ——';
  } else {
    div.className = 'msg master';

    var color = m ? m.accent : '#8b6f5c';
    var initial = m ? m.initial : '?';
    div.style.background = bg;
    div.innerHTML = '<div class="msg-header">'
      + '<div class="msg-avatar" style="background:'+color+'">' + initial + '</div>'
      + '<span class="msg-name" style="color:'+color+'">' + (m ? m.name : name) + '</span>'
      + '</div>'
      + '<div class="msg-text" style="font-size:'+fontSize+'%;font-family:' + (m && m.font ? m.font : '') + '">' + renderInline(text) + '</div>'
      + '<div style="margin-top:6px;"><button onclick="quickAsk(\''+(m?m.name:name)+'\')" style="background:none;border:1px solid '+color+';border-radius:4px;padding:1px 8px;font-size:10px;cursor:pointer;color:'+color+';font-family:inherit;">追问 →</button></div>';
  }
  area.appendChild(div);
  area.scrollTop = area.scrollHeight;
  return div;
}

function escapeHtml(str) {
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\n/g,'<br>');
}
function renderInline(str) {
  // Escape first, then convert inline markdown
  var s = escapeHtml(str);
  s = s.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
  s = s.replace(/\*(.+?)\*/g, '<em>$1</em>');
  return s;
}

// ====== @ Parsing helpers ======
// Build a name lookup: name -> key
function getNameToKey() {
  var map = {};
  allMasterKeys.forEach(function(k) { map[MASTERS[k].name] = k; });
  return map;
}

function parseAtMentions(text) {
  var nameMap = getNameToKey();
  var mentioned = [];
  for (var key in nameMap) {
    if (text.indexOf('@' + nameMap[key]) !== -1) mentioned.push(nameMap[key]);
  }
  // Also match by display name
  for (var n in nameMap) {
    if (text.indexOf('@' + n) !== -1 && mentioned.indexOf(nameMap[n]) === -1) mentioned.push(nameMap[n]);
  }
  return mentioned;
}

async function sendMsg() {
  var input = document.getElementById('inputEl');
  var text = input.value.trim();
  if (!text || isLoading) return;

  // Parse @mentions
  var mentioned = parseAtMentions(text);

  // Scenario recommendation: check if keywords suggest inviting other masters
  var suggest = checkScenario(text);
  if (suggest.length > 0) {
    var names = [];
    suggest.forEach(function(k) { names.push(MASTERS[k].name); });
    setTimeout(function() {
      if (confirm('检测到关键词，是否邀请 ' + names.join('、') + ' 加入圆桌？')) {
        suggest.forEach(function(k) {
          if (activeMasters.indexOf(k) === -1) {
            var cfg = getActiveConfig();
            var isDefault = (apiMode !== 'custom' || !customKey);
            var newCount = activeMasters.length + 1;
            if (isDefault && newCount > 3) { showApiLimitWarning(); return; }
            activeMasters.push(k);
            autoRespond[k] = true;
          }
        });
        renderAvatarBar();
        saveProfile();
        addSystemMsg(names.join('、') + ' 加入了圆桌');
        suggest.forEach(function(k) { showMasterIntro(k); });
      }
    }, 200);
  }

  // Determine which masters respond
  var responders = [];
  if (respondMode === 'mention' && mentioned.length > 0) {
    // Only mention-targeted masters
    responders = mentioned.filter(function(k) { return activeMasters.indexOf(k) !== -1; });
  } else {
    // All auto-respond masters
    responders = activeMasters.filter(function(k) { return autoRespond[k]; });
    // If no one has auto-respond on, default to all active
    if (responders.length === 0) responders = activeMasters.slice();
  }
  if (responders.length === 0) { showBanner('没有可回应的大师'); return; }

  // Add user message
  addMsg(null, text, true);
  conversation.push({name:'user', text:text, time:Date.now()});
  rtUserMsgCount++; rtMaybeAutoReward();
  input.value = '';
  input.style.height = 'auto';

  isLoading = true;
  document.getElementById('sendBtn').disabled = true;

  // Show typing indicators
  responders.forEach(function(key) {
    var m = MASTERS[key];
    var area = document.getElementById('chatArea');
    var td = document.createElement('div');
    td.className = 'typing';
    td.id = 'typing_' + key;
    td.innerHTML = '<div class="typing-dots"><span></span><span></span><span></span></div>'
      + '<span class="typing-label">' + m.name + ' 正在思考…</span>';
    area.appendChild(td);
  });
  document.getElementById('chatArea').scrollTop = document.getElementById('chatArea').scrollHeight;

  // Build conversation history
  var convHistory = conversation.map(function(msg) {
    var caller = getCallName(); var prefix = msg.name === 'user' ? caller : MASTERS[msg.name] ? MASTERS[msg.name].name : msg.name;
    return { role: msg.name === 'user' ? 'user' : 'assistant', content: '[' + prefix + '] ' + msg.text };
  });
  var userMsg = { role: 'user', content: '用户：' + text };
  var activeNames = activeMasters.map(function(k) { return MASTERS[k].name; }).join('、');

  // Round 1: parallel API calls for all responders
  var promises1 = responders.map(function(key) {
    return callMasterAPI(key, activeNames, convHistory, userMsg, false);
  });

  var results1 = await Promise.allSettled(promises1);

  // Remove typing indicators
  responders.forEach(function(key) {
    var td = document.getElementById('typing_' + key);
    if (td) td.remove();
  });

  // Process Round 1 results
  var repliedKeys = [];
  results1.forEach(function(r, i) {
    var key = responders[i];
    if (r.status === 'fulfilled' && r.value) {
      addMsg(key, r.value);
      conversation.push({name:key, text:r.value, time:Date.now()});
      repliedKeys.push(key);
    } else {
      var m = MASTERS[key];
      addMsg(key, '（' + m.name + '暂时无法回应）');
    }
  });

  // ====== Round 2+ : Plan B - Sequential reactions ======
  var isMention = mentioned.length > 0;

  // Build the base history including Round 0 results
  var convHistory2 = conversation.map(function(msg) {
    var caller = getCallName(); var prefix = msg.name === 'user' ? caller : MASTERS[msg.name] ? MASTERS[msg.name].name : msg.name;
    return { role: msg.name === 'user' ? 'user' : 'assistant', content: '[' + prefix + '] ' + msg.text };
  });

  if (respondRounds > 1 && repliedKeys.length >= 2) {
    addSystemMsg(isMention ? '大师们正在回应……' : '大师之间正在交流…');

    if (isMention && mentioned.length > 0) {
      // === @mention flow ===
      // Round 1: Others respond to the @-ed master in parallel
      var targetKey = mentioned[0];  // the @-ed master
      var others = repliedKeys.filter(function(k) { return k !== targetKey; });
      if (others.length > 0) {
        var mentionPromises = others.map(function(key) {
          // Only see: user + the @-ed master's Round 0
          var filtered = convHistory2.filter(function(msg) {
            var selfPrefix = MASTERS[key].name + '：';
            var targetPrefix = MASTERS[targetKey].name + '：';
            var raw = msg.content || '';
            // Don't see own, DO see the @-ed master
            if (raw.indexOf(selfPrefix) === 0) return false;
            // See only user and the target master
            if (raw.indexOf(targetPrefix) === 0) return true;
            if (msg.role === 'user') return true;
            return false;
          });
          return callMasterAPI(key, activeNames, filtered, null, true);
        });
        var mentionResults = await Promise.allSettled(mentionPromises);
        mentionResults.forEach(function(r, i) {
          var key = others[i];
          if (r.status === 'fulfilled' && r.value) {
            addMsg(key, r.value);
            conversation.push({name:key, text:r.value, time:Date.now()});
          }
        });
      }
      // Round 2: @-ed master does summary
      var finalHistory = conversation.map(function(msg) {
        var caller = getCallName(); var prefix = msg.name === 'user' ? caller : MASTERS[msg.name] ? MASTERS[msg.name].name : msg.name;
        return { role: msg.name === 'user' ? 'user' : 'assistant', content: '[' + prefix + '] ' + msg.text };
      });
      var finalReply = await callMasterAPI(targetKey, activeNames, finalHistory, null, true);
      if (finalReply) {
        addMsg(targetKey, finalReply);
        conversation.push({name:targetKey, text:finalReply, time:Date.now()});
      }
    } else {
      // === Normal flow: serial rounds ===
      var serialOrder = getSerialOrder(repliedKeys);

      // Serial: one by one, with delay so bubbles appear one at a time
      for (var si = 0; si < serialOrder.length; si++) {
        var sKey = serialOrder[si];
        var isLast = (si === serialOrder.length - 1);

        // Build current history: exclude all messages from this master
        var currentHistory = conversation.map(function(msg) {
          var caller = getCallName(); var prefix = msg.name === 'user' ? caller : MASTERS[msg.name] ? MASTERS[msg.name].name : msg.name;
          return { role: msg.name === 'user' ? 'user' : 'assistant', content: '[' + prefix + '] ' + msg.text };
        });
        // Filter out this master's own messages
        var filtered = currentHistory.filter(function(msg) {
          var selfPrefix = MASTERS[sKey].name + '：';
          var raw = msg.content || '';
          return raw.indexOf(selfPrefix) !== 0;
        });

        // Add a typing indicator for this master
        var td = document.createElement('div'); td.className = 'typing'; td.id = 'typing_s_' + sKey;
        td.innerHTML = '<div class="typing-dots"><span></span><span></span><span></span></div><span class="typing-label">' + MASTERS[sKey].name + ' 正在回应……</span>';
        document.getElementById('chatArea').appendChild(td);
        document.getElementById('chatArea').scrollTop = document.getElementById('chatArea').scrollHeight;

        // Call API (isSummaryMode for last - Winnicott)
        var sReply = await callMasterAPI(sKey, activeNames, filtered, null, isLast ? 'summary' : true);

        // Remove typing
        var tdEl = document.getElementById('typing_s_' + sKey);
        if (tdEl) tdEl.remove();

        if (sReply) {
          addMsg(sKey, sReply);
          conversation.push({name:sKey, text:sReply, time:Date.now()});
        }

        // Brief delay between serial rounds (except last)
        if (si < serialOrder.length - 1) {
          await new Promise(function(r) { setTimeout(r, 600); });
        }
      }
    }
  }

  isLoading = false;
  document.getElementById('sendBtn').disabled = false;
  input.focus();
}

// ====== Call API for a single master ======
async function callMasterAPI(key, activeNames, history, userMsg, isReactMode) {
  var m = MASTERS[key];
  if (!m) return '';

  try {
    var res = await fetch(m.kb);
    var kbContent = await res.text();

    var sysPrompt;
    if (isReactMode === 'summary') {
      // Final summary round (Winnicott)
      sysPrompt = '[你是' + m.name + '，你是这场圆桌讨论的总结者。'
        + '\n在场的还有：' + activeNames + '。'
        + '\n\n刚才各位大师围绕用户的问题各自发表了看法，还进行了讨论。'
        + '\n现在请你作为最后发言的人，对整场讨论做总结性回应，然后把注意力带回用户身上。'
        + '\n\n规则：'
        + '\n① 用「我」说话。'
        + '\n② 可以提到其他大师的观点（例如"弗洛伊德刚才提到……我同意他的看法"）。'
        + '\n③ 控制在120字以内，做一个有温度的收尾，把注意力带回用户。'
        + '\n④ 可使用*斜体*或**加粗**做适度强调。禁止使用#、※、-等符号做列表或标题。]\n\n' + kbContent;
    } else if (isReactMode) {
      // Serial reaction round
      sysPrompt = '[你是' + m.name + '。刚才用户提问后，各位大师已经分别回应了。'
        + '\n在场的还有：' + activeNames + '。'
        + '\n你刚才已经说过你的看法了。现在请看看其他大师说了什么。'
        + '\n如果你觉得有必要补充、回应或质疑，可以说一两句。'
        + '\n如果觉得没什么要补充的，输出空字符串。'
        + '\n\n规则：'
        + '\n① 用「我」说话。'
        + '\n② 可以直接对其他大师说话（例如"温尼科特，我同意你的看法……"）。'
        + '\n③ 控制在80字以内，简短自然。'
        + '\n④ 可使用*斜体*或**加粗**做适度强调。禁止使用#、※、-等符号做列表或标题。'
        + '\n⑤ 没什么要说的就输出一个空格。'
        + '\n⑥ 温尼科特作为最后总结者时，记得把话题带回用户身上，问问用户的感受或想法。]\n\n' + kbContent;
    } else {
      sysPrompt = '[你是' + m.name + '，你是参与圆桌讨论的其中一位。'
        + '\n在场的还有：' + activeNames + '。'
        + '\n\n规则：'
        + '\n① 用「我」说话。就像你本人坐在房间里一样。'
        + '\n② 独立回应。你正在和所有人同时发言，所以你看不到其他人此刻说了什么。不要假设你知道别人会说什么。'
        + '\n③ 每条回应控制在150字以内，自然、口语化。'
        + '\n④ 可使用*斜体*或**加粗**做适度强调。禁止使用#、※、-等符号做列表或标题。'
        + '\n⑤ 不要替用户做决定。'
        + '\n⑥ 保持你的人格和语气——你的经历决定了你如何看待问题。'
        + '\n⑦ 你可以根据你的风格决定是否在回应中关注用户。温尼科特许会自然地询问用户的称呼；弗洛伊德可能专注于分析而不问；荣格可能问一个关于梦的后续问题。一切由你的性格决定。]\n\n' + kbContent;
    }

    var msgs = [{ role: 'system', content: sysPrompt }];
    history.forEach(function(h) { msgs.push(h); });
    if (userMsg) msgs.push(userMsg);

    var cfg = getActiveConfig();
    var apiRes = await fetch(cfg.api, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + cfg.key },
      body: JSON.stringify({ model: cfg.model, messages: msgs, temperature: isReactMode ? 0.6 : 0.7, max_tokens: isReactMode === 'summary' ? 600 : (isReactMode ? 400 : 512), stream: false })
    });
    if (!apiRes.ok) return '';
    var data = await apiRes.json();
    var reply = data.choices && data.choices[0] && data.choices[0].message ? data.choices[0].message.content.trim() : '';
    if (reply === ' ' || reply === '') return '';  // nothing to say
    return reply;
  } catch(e) {
    return '';
  }
}

// ====== Scenario keywords ======
var SCENARIOS = {
  '梦': ['freud','jung'], '梦境': ['freud','jung'], '梦见': ['freud','jung'],
  '死亡': ['yalom'], '去世': ['yalom'], '临终': ['yalom'],
  '童年': ['klein','winnicott'], '小时候': ['klein','winnicott'], '父母': ['klein','winnicott'],
  '关系': ['rogers','klein'], '婚姻': ['rogers','klein'],
  '焦虑': ['beck','yalom'], '恐惧': ['beck','yalom'], '害怕': ['beck','yalom'],
  '自卑': ['adler'], '勇气': ['adler'],
  '认知': ['beck'], '思维': ['beck'], '想法': ['beck']
};

function checkScenario(text) {
  var suggestKeys = [];
  for (var keyword in SCENARIOS) {
    if (text.indexOf(keyword) !== -1) {
      SCENARIOS[keyword].forEach(function(k) {
        if (activeMasters.indexOf(k) === -1 && suggestKeys.indexOf(k) === -1) suggestKeys.push(k);
      });
    }
  }
  return suggestKeys;
}

// ====== Init ======
var userName = localStorage.getItem('rt_user_name') || '';

function confirmName() {
  var input = document.getElementById('nameInput');
  var name = input.value.trim();
  if (!name) return;
  userName = name;
  localStorage.setItem('rt_user_name', name);
  document.getElementById('nameOverlay').style.display = 'none';
  input.disabled = true;
}

function getCallName() { return userName || '朋友'; }

// Show name dialog if no cached name
if (!userName) {
  document.getElementById('nameOverlay').style.display = 'flex';
  document.getElementById('nameInput').focus();
}

loadProfile();  // Restore saved profile before rendering
renderAvatarBar();
// Restore font size
var savedFont = parseInt(localStorage.getItem('rt_font'));
if (savedFont) { fontSize = savedFont; }
// Winnicott intro on first visit
showMasterIntro('winnicott');
addMsg(null, '欢迎来到圆桌会议室。点击头像切换自动回应，输入 @大师名 可指定回应对象。', true);

// ====== Banner ======
var bannerTimer = null;
function showBanner(text) {
  var el = document.getElementById('banner');
  el.textContent = text;
  el.classList.add('show');
  clearTimeout(bannerTimer);
  bannerTimer = setTimeout(function(){ el.classList.remove('show'); }, 2500);
}

// ====== History ======
var HISTORY_KEY = 'rt_history';

function saveHistory() {
  if (conversation.length === 0) { showBanner('没有对话内容可保存'); return; }
  var h = []; try { h = JSON.parse(localStorage.getItem(HISTORY_KEY)) || []; } catch(e) {}
  var title = '圆桌·' + new Date().toLocaleString('zh-CN', {month:'2-digit',day:'2-digit',hour:'2-digit',minute:'2-digit'});
  var firstMsg = '';
  for (var i = 0; i < conversation.length; i++) {
    if (conversation[i].name !== 'user') { firstMsg = conversation[i].text.slice(0, 20); break; }
  }
  if (firstMsg) title += ' ' + firstMsg;
  var entry = {
    id: Date.now().toString(36) + Math.random().toString(36).slice(2,6),
    title: title,
    time: Date.now(),
    msgCount: conversation.length,
    masters: activeMasters.slice(),
    messages: JSON.parse(JSON.stringify(conversation))
  };
  h.unshift(entry);
  if (h.length > 30) h = h.slice(0, 30);
  localStorage.setItem(HISTORY_KEY, JSON.stringify(h));
  showBanner('对话已保存');
}

function showHistory() {
  var h = []; try { h = JSON.parse(localStorage.getItem(HISTORY_KEY)) || []; } catch(e) {}
  var list = document.getElementById('historyList');
  if (h.length === 0) {
    list.innerHTML = '<div class="history-empty">暂无保存的对话</div>';
  } else {
    var html = '';
    h.forEach(function(entry) {
      html += '<div class="history-item">'
        + '<div class="hi-info" onclick="loadHistory(\'' + entry.id + '\')">'
        + '<div class="hi-title">' + escapeHtml(entry.title) + '</div>'
        + '<div class="hi-meta">' + entry.msgCount + '条 · ' + new Date(entry.time).toLocaleString() + '</div>'
        + '</div>'
        + '<div class="hi-actions">'
        + '<button onclick="event.stopPropagation();deleteHistory(\'' + entry.id + '\')">删除</button>'
        + '</div>'
        + '</div>';
    });
    list.innerHTML = html;
  }
  document.getElementById('historyOverlay').classList.add('show');
}

function loadHistory(id) {
  var h = []; try { h = JSON.parse(localStorage.getItem(HISTORY_KEY)) || []; } catch(e) {}
  var entry = null;
  for (var i = 0; i < h.length; i++) { if (h[i].id === id) { entry = h[i]; break; } }
  if (!entry) { showBanner('未找到历史记录'); return; }
  // Restore masters
  if (entry.masters) { activeMasters = entry.masters; renderAvatarBar(); }
  // Restore conversation
  conversation = JSON.parse(JSON.stringify(entry.messages));
  // Clear chat area
  var area = document.getElementById('chatArea');
  area.innerHTML = '';
  // Re-render all messages
  conversation.forEach(function(msg) {
    if (msg.name === 'user') {
      addMsg(null, msg.text, true);
    } else if (MASTERS[msg.name]) {
      addMsg(msg.name, msg.text);
    }
  });
  closeHistory();
  showBanner('已加载历史对话');
}

function deleteHistory(id) {
  var h = []; try { h = JSON.parse(localStorage.getItem(HISTORY_KEY)) || []; } catch(e) {}
  h = h.filter(function(e) { return e.id !== id; });
  localStorage.setItem(HISTORY_KEY, JSON.stringify(h));
  showHistory();
}

function closeHistory() {
  document.getElementById('historyOverlay').classList.remove('show');
}

// ====== Clear chat ======
function clearChat() {
  if (conversation.length === 0) return;
  if (!confirm('确定开始新对话？当前对话将被清除。')) return;
  conversation = [];
  var area = document.getElementById('chatArea');
  area.innerHTML = '';
  addMsg(null, '新的圆桌对话开始了。温尼科特依然在座。', true);
}
